llm:
  provider: deepseek
  model: deepseek-chat
  model_variants:
    flash: deepseek-chat
    pro: deepseek-chat
  active_variant: flash
  temperature: 0.0
  max_tokens: 4096

# ── Phase 2.14.7 — Kill‑switch for real LLM backend ──────────────────────
# Set to true only after passing the readiness checklist (Phase 2.14.6).
enable_real_llm: false

agent:
  loop_policy:
    max_steps: 50
    per_step_timeout: 10
    max_wall_time: 60

policy:
  allowed_tools:
    - fetch_url
    - http_get
    - math
    - text
  max_arg_size: 2000
  max_tool_name: 64

logging:
  enabled: true

telemetry:
  enabled: true

# ── PHASE 3.13.1 — Search Provider Configuration ──────────────────────────
# Keeping this config in the runtime ensures the LLM NEVER sees the
# provider name, API key, or endpoint.  The LLM only receives normalised
# search results: {title, url, snippet}.
#
# default_provider: canonical name of the provider to use.
# providers.<name>.api_key_env: env var holding the API key (omitted for keyless providers).
# providers.<name>.max_results: default maximum results per query.
search:
  enabled: true                    # DuckDuckGo + Tavily providers are configured
  default_provider: tavily
  providers:
    tavily:
      api_key_env: TAVILY_API_KEY
      max_results: 5
      timeout: 15.0
    duckduckgo:
      max_results: 5
      timeout: 10.0