llm:
  provider: deepseek
  model: deepseek-chat
  model_variants:
    flash: deepseek-chat
    pro: deepseek-chat
  active_variant: flash
  temperature: 0.0
  max_tokens: 4096

# Kill‑switch for real LLM backend
enable_real_llm: true

agent:
  loop_policy:
    max_steps: 50
    per_step_timeout: 10
    max_wall_time: 60

policy:
  allowed_tools:
    - fetch_url
    - http_get
    - math
    - text
  max_arg_size: 2000
  max_tool_name: 64

logging:
  enabled: true

telemetry:
  enabled: true

# Controls when older conversation turns are summarised into a compact
# summary to reduce context-window pressure.
compaction:
  enabled: true
  context_pressure_threshold: 0.8
  turn_count_threshold: 10
  keep_recent_turns: 4
  summary_style: structured
  min_tokens_for_compaction: 2000
  tool_output_threshold: 10000

# Keeping this config in the runtime ensures the LLM NEVER sees the
# provider name, API key, or endpoint.  The LLM only receives normalised
# search results: {title, url, snippet}.
ssearch:
  enabled: true                    # DuckDuckGo + Tavily providers are configured
  default_provider: tavily
  providers:
    tavily:
      api_key_env: TAVILY_API_KEY
      max_results: 5
      timeout: 15.0
    duckduckgo:
      max_results: 5
      timeout: 10.0

# Embedding Provider Configuration
# Controls the semantic embedding backend used for skill discovery fallback.
# Embeddings are ONLY consulted when the LLM fails to name a capability.
#
# provider:  'openai' | 'local' | 'mock'
#   - openai: requires OPENAI_API_KEY env var, fast cloud API
#   - local:  runs MiniLM-L6-v2 in-process (384-dim), no API key needed,
#             model auto-downloaded to .models/ on first use
#   - mock:   deterministic zero-vector, for unit tests only
# model:     passed to the provider (e.g. 'text-embedding-3-small')
# dimensions: expected vector dimension (1536 for openai, 384 for MiniLM)
embedding:
  provider: local
  model: all-MiniLM-L6-v2
  dimensions: 384

# Fan-out / fan-in parallel execution pool for decomposition (Phase 6).
# pool_size controls how many worker threads process subtasks concurrently.
# Increase for I/O-bound (LLM) subtasks; decrease for CPU-bound work.
decomposition:
  worker_pool:
    pool_size: 5