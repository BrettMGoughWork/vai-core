llm:
  provider: deepseek
  model: deepseek-chat
  model_variants:
    flash: deepseek-chat
    pro: deepseek-chat
  active_variant: flash
  temperature: 0.0
  max_tokens: 4096

# ── Phase 2.14.7 — Kill‑switch for real LLM backend ──────────────────────
# Set to true only after passing the readiness checklist (Phase 2.14.6).
enable_real_llm: false

agent:
  loop_policy:
    max_steps: 50
    per_step_timeout: 10
    max_wall_time: 60

policy:
  allowed_tools:
    - fetch_url
    - http_get
    - math
    - text
  max_arg_size: 2000
  max_tool_name: 64

logging:
  enabled: true

telemetry:
  enabled: true