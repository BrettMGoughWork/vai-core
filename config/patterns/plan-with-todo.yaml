pattern_id: plan_with_todo
name: Plan with Todo
description: >-
  The complete todo-list planning lifecycle: break down a goal into actionable
  items, present the plan to the user, execute items one at a time via the
  TodoWorker loop, verify completion, and handle errors. This is the primary
  pattern agents use to plan and carry out multi-step work.
primitives:
  - stdlib.todo.create_batch
  - stdlib.todo.add_dependency
  - stdlib.todo.list
  - stdlib.todo.get_next
  - stdlib.todo.mark_done
  - stdlib.todo.mark_failed
  - stdlib.todo.mark_blocked
  - stdlib.todo.status_summary
instructions: |
  To plan and execute a multi-step task using the todo list:

  ## Phase 1: Breakdown

  Use `stdlib.todo.create_batch` to populate the plan. Each item must have:
  - `id`: kebab-case, descriptive (e.g., "create-user-schema", "write-auth-tests").
  - `title`: gerund form, human-readable.
  - `description`: standalone detail — someone can execute this item without
    reading any other item.
  - `depends_on` (optional): list of item IDs that must finish first.

  Keep items small enough to be completed in ONE focused LLM response, but
  large enough to be meaningful. Aim for 3-10 items per plan.

  ## Phase 2: Present

  After creating the plan, ALWAYS present it to the user:
  1. Use `stdlib.todo.list` to read back all items.
  2. Use `stdlib.todo.status_summary` for progress counts.
  3. Summarize: total items, dependency chains, which items are ready now.
  4. Ask the user to confirm before executing.

  ## Phase 3: Execute (Fan-out / Fan-in)

  After the user confirms the plan, call `execute_todo_plan(db_path=...)`
  available as a synthetic tool in the tool context. This tool will:
  - Fan-out all pending todos to parallel workers, respecting dependencies
    (items whose `depends_on` are all done run first; sequential chains
    are preserved).
  - Fan-in and merge results into a single summary.
  - Mark each todo done or failed automatically.

  Do NOT loop through items manually — delegate to `execute_todo_plan`.
  If execution succeeds, briefly report how many items completed.
  If it fails or returns a timeout, use `stdlib.todo.status_summary` to
  check state and ask the user how to proceed.

  ## Phase 4: Verify

  When all items are done (or the plan is otherwise complete):
  1. Use `stdlib.todo.status_summary` to confirm 100% completion.
  2. Review the plan against the original goal — did we miss anything?
  3. If gaps exist, add follow-up items with `stdlib.todo.create` and
     `stdlib.todo.add_dependency`, then continue executing.
  4. Present a final summary: what was accomplished, any failed items,
     and what (if anything) remains.

  ## Error Handling

  - **Retry on transient errors**: failed items with remaining retries
    will be re-offered by `get_next` automatically.
  - **Persistent failures**: after `retries_exhausted`, stop and ask
    the user. Don't silently abandon work.
  - **Blocked items**: if blocked, tell the user what's blocking and why.
    The plan cannot proceed until the block is resolved.

  ## Tips

  - Prefer `create_batch` for the initial plan (one call = all items + deps).
    Use `create` + `add_dependency` only for adding items mid-execution.
  - Don't write raw SQL — the `stdlib.todo.*` primitives handle everything.
  - The `db_path` value comes from context — never hard-code it.
  - If the user interrupts, save progress and let them resume later.
    The todo list IS the durable plan state.
version: 1.0.0
