pattern_id: summarise_inbox
name: Summarise Inbox
description: >-
  Search recent inbox messages and produce a structured summary of key
  emails, grouped by priority or thread.
primitives:
  - gmail_search
  - gmail_read
instructions: |
  To summarise the user's inbox:

  1. Use gmail_search to find recent unread or important emails.
     - Search for "is:unread" to get unread messages.
     - Search for "is:important" to get priority messages.
     - Limit to the last 7 days unless the user specifies otherwise.
  2. For each high-priority thread, optionally use gmail_read to get the full content.
  3. Group results by:
     - Urgent / requires action
     - Informational / FYI
     - Low priority / newsletters
  4. Present a structured summary with:
     - Sender name
     - Subject
     - Brief one-line summary
     - Whether a reply is needed

  Keep the summary concise. Only read full emails when the subject line
  alone is insufficient to categorize.
version: 1.0.0
