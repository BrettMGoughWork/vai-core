pattern_id: todo_prioritize
name: "Todo Prioritize"
description: >
  Analyze a todo list's dependency graph to determine execution order.
  Identifies which items can start immediately (no blocking deps), which
  are blocked and by what, and suggests optimal parallel execution groups.
  Useful when the agent wants to understand execution order without
  running the full TodoWorker pipeline.
primitives:
  - stdlib.todo.list
  - stdlib.todo.get_next
  - stdlib.todo.status_summary
instructions: |
  To prioritize a todo list:

  1. **Read the current state**. Use `stdlib.todo.list` with the provided
     `db_path`. This returns all items with their statuses and
     `depends_on` lists — no raw SQL needed.

  2. **Build the dependency graph**. For each todo, determine:
     - **Ready now**: status is `pending` and ALL `depends_on` items
       have status `done`. These can start immediately.
     - **Blocked**: status is `pending` but at least one dependency
       is not `done`. Note WHICH dependencies are blocking.
     - **In progress**: status is `in_progress` — already being worked on.
     - **Done / Failed**: already completed or exhausted retries.

  3. **Verify with get_next**. Use `stdlib.todo.get_next` to confirm
     which item the system considers ready. If it returns `next: null`,
     all pending items are blocked.

  4. **Suggest execution groups**. Group ready items into parallel
     batches — items with no inter-dependencies can run concurrently.
     Items in different groups have dependency chains and must run
     sequentially.

  5. **Present the priority order** as a structured list:
     - Group 1 (start now): items with no dependencies.
     - Group 2 (after Group 1): items whose deps are all in Group 1.
     - Group 3+: continue chaining.
     - Blocked: items waiting on non-done dependencies (name them).

  6. **Flag risks**:
     - Circular dependencies (A depends on B, B depends on A).
     - Orphan dependencies (depends_on references a non-existent todo id).
     - Items with no clear path to completion.

  **Use this pattern** before starting execution to give the user a
  clear picture of what will happen and in what order. It is read-only
  — it does NOT modify any todos.
version: 1.0.0
