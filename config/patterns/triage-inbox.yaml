pattern_id: triage_inbox
name: Triage Inbox
description: >-
  Scan the inbox and categorize messages into action buckets: reply-needed,
  archive, delegate, or follow-up.
primitives:
  - gmail_search
  - gmail_read
  - gmail_send
instructions: |
  To triage the user's inbox:

  1. Use gmail_search to find recent unread emails.
     - Search for "is:unread" with a reasonable date range (e.g. last 7 days).
  2. For each email, read the content using gmail_read to understand context.
  3. Categorize each email into one of these buckets:
     - **Reply needed**: Requires a personal response from the user.
     - **Quick reply**: You can handle with a brief acknowledgment or answer.
     - **Archive / read-only**: No action needed, just informational.
     - **Delegate**: Should be handled by someone else (note who).
     - **Follow-up**: Needs action but not immediately urgent.
  4. Present the triage results as an ordered list, with highest-priority
     items first. Include:
     - Sender
     - Subject
     - Category
     - Recommended action (one sentence)
  5. For "Quick reply" items, offer to draft and send the reply immediately.

  Default: do NOT send anything without confirmation. Mark items clearly
  so the user can decide at a glance.
version: 1.0.0
