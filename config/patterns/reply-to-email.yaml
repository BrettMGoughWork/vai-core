pattern_id: reply_to_email
name: Reply to Email
description: >-
  Read an email by ID and compose a contextual reply, then send it.
  Useful when the user wants to respond to a specific email thread.
primitives:
  - gmail_read
  - gmail_send
instructions: |
  To reply to an email:

  1. Use gmail_read to get the full email content by its message_id.
  2. Analyze the email body, subject, and sender to understand the context and intent.
  3. Draft a concise, natural reply that addresses the email's content directly.
  4. Use gmail_send with the thread_id from the original email to preserve threading.
  5. Confirm to the user what was sent, including a brief summary.

  Tone: match the original email's formality level.
  Always preserve the thread_id for proper threading.
  If the email is ambiguous, ask ONE clarifying question before drafting.
version: 1.0.0
