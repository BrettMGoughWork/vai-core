# ── Agent Manifest ──────────────────────────────────────────────────────────
# Declarative agent definitions.  Add a new entry here to create a new agent.
#
# Loaded at startup by::
#
#     load_agent_manifest(registry, "config/agents.yaml")
#
# Fields
# ------
# agent_id         Required — stable, unique identifier used in dispatch.
# name             Required — human-readable name.
# description      Optional — short purpose statement.
# version          Required — semver MAJOR.MINOR.PATCH.
# provenance       Required — built-in | user-defined | system.
# capabilities     Required — list of capability labels.
#   Known labels: conversational, planning, analysis, tool_use,
#                 job_submission, summarization, routing.
# inputs           Optional — list of accepted input types.
# outputs          Optional — list of produced output types.
# constraints      Optional — resource & safety limits:
#   max_tokens     Per-response token budget (0 = unlimited).
#   timeout_ms     Wall-clock timeout in ms (0 = unlimited).
#   sandbox        Isolation level: none | process | container.

agents:
  - agent_id: assistant
    name: General Assistant
    description: |
      A general-purpose conversational assistant.  Handles free-form
      Q&A, tool-based tasks, and multi-step reasoning.
    version: 1.0.0
    provenance: built-in
    capabilities:
      - conversational
      - tool_use
      - analysis
    inputs:
      - text
      - markdown
    outputs:
      - text
      - markdown
    constraints:
      max_tokens: 4096
      max_iterations: 10
      timeout_ms: 30000
      sandbox: none

  - agent_id: help
    name: Help Agent
    description: |
      Provides inline help about the system itself — available agents,
      capabilities, commands, and configuration.
    version: 1.0.0
    provenance: built-in
    capabilities:
      - conversational
      - summarization
    inputs:
      - text
    outputs:
      - text
    constraints:
      max_tokens: 2048
      max_iterations: 5
      timeout_ms: 15000
      sandbox: none
