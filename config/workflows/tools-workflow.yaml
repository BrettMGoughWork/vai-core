# Tools execution workflow
# Dispatches a tool via S4B then completes.
workflow_id: tools-workflow
name: "Tool Executor"
description: "A workflow with one tool_execute step"
version: "1.0.0"
trigger_on:
  - "workflow_request"

steps:
  run_tool:
    step_id: run_tool
    step_type: tool_execute
    label: "Run a tool"
    config:
      skill_name: stdlib.echo
      arguments:
        value: "Hello from the real stdlib.echo primitive!"
    transitions:
      on_success: __end__

start_step: run_tool
